services:
  vaulty:
    image: larsmikki/vaulty:latest
    container_name: vaulty
    ports:
      - "3110:3110"
    environment:
      - PORT=3110
    volumes:
      - vaulty_data:/app/vault
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3110/api/health"]
      interval: 5m
      timeout: 5s
      retries: 3
      start_period: 90s

volumes:
  vaulty_data:
